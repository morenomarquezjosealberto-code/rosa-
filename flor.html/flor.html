<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rosa Legendaria</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let t = 0;

// ⭐ estrellas
let stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2
  });
}

// 🌸 pétalos
let petals = [];
for (let i = 0; i < 50; i++) {
  petals.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    speed: 1 + Math.random() * 2,
    size: 3 + Math.random() * 3
  });
}

function drawScene() {
  // fondo
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 🌙 luna
  let moonX = canvas.width * 0.8;
  let moonY = canvas.height * 0.2;

  let gradient = ctx.createRadialGradient(moonX, moonY, 10, moonX, moonY, 80);
  gradient.addColorStop(0, "white");
  gradient.addColorStop(1, "rgba(255,255,255,0)");

  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(moonX, moonY, 80, 0, Math.PI * 2);
  ctx.fill();

  // ⭐ estrellas
  ctx.fillStyle = "white";
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // ⛰️ montañas
  ctx.fillStyle = "#111";
  ctx.beginPath();
  ctx.moveTo(0, canvas.height * 0.7);
  ctx.lineTo(200, canvas.height * 0.5);
  ctx.lineTo(400, canvas.height * 0.7);
  ctx.lineTo(700, canvas.height * 0.4);
  ctx.lineTo(1000, canvas.height * 0.7);
  ctx.lineTo(canvas.width, canvas.height * 0.6);
  ctx.lineTo(canvas.width, canvas.height);
  ctx.lineTo(0, canvas.height);
  ctx.fill();

  // 🌿 pasto
  ctx.fillStyle = "#0a2";
  ctx.fillRect(0, canvas.height * 0.8, canvas.width, canvas.height);

  // 💨 niebla
  ctx.fillStyle = "rgba(255,255,255,0.03)";
  for (let i = 0; i < 20; i++) {
    let x = (Math.sin(t + i) * 200) + canvas.width / 2;
    let y = canvas.height * 0.7 + i * 10;
    ctx.beginPath();
    ctx.arc(x, y, 100, 0, Math.PI * 2);
    ctx.fill();
  }

  // 🌱 tallo
  let cx = canvas.width / 2;
  let cy = canvas.height * 0.75;

  ctx.strokeStyle = "green";
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.quadraticCurveTo(cx - 20, cy - 100, cx, cy - 200);
  ctx.stroke();

  // 🌹 rosa
  for (let i = 0; i < 800; i++) {
    let angle = i * 0.1;
    let r = 100 * Math.sin(4 * angle + t) * Math.cos(2 * angle);

    let x = cx + r * Math.cos(angle);
    let y = (cy - 200) + r * Math.sin(angle);

    let size = 2 + Math.sin(angle + t) * 2;

    ctx.fillStyle = `hsl(${340 + Math.sin(angle + t) * 20}, 80%, 60%)`;
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
  }

  // 🌸 pétalos cayendo
  ctx.fillStyle = "pink";
  petals.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();

    p.y += p.speed;
    p.x += Math.sin(t + p.y) * 0.5;

    if (p.y > canvas.height) {
      p.y = 0;
      p.x = Math.random() * canvas.width;
    }
  });

  t += 0.02;
  requestAnimationFrame(drawScene);
}

drawScene();
</script>

</body>
</html>
